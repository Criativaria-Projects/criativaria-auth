name = "auth"
main = "src/index.js"
compatibility_date = "2026-07-02"

# routes: auth.criativaria.com volta na Fase B do ADR-0003 (zona ainda na conta antiga)

[vars]
# Origens autorizadas a receber tokens SSO (proteção contra open redirect).
# Uma por site de staging, separadas por vírgula.
ALLOWED_ORIGINS = "https://criativaria-clt-pj.pages.dev,https://admin.criativaria.com,https://posicionamento.criativaria.com"
# Sufixos de projeto Cloudflare Pages: cobrem TODOS os subdomínios de preview
# (`<branch>.<host>`) sem precisar allowlistar cada branch. Use o HOST COMPLETO
# auto-suffixado do projeto (ex.: `criativaria-linkedin-34m.pages.dev`), NUNCA o
# `pages.dev` pelado (recusado em código). Ver ADR 0002.
ALLOWED_ORIGIN_SUFFIXES = "criativaria-linkedin-34m.pages.dev"
DISCORD_CLIENT_ID = "1517548885038338140"
DISCORD_GUILD_ID = "895505900016631839"

# Secrets (via `wrangler secret put` ou CI):
#   DISCORD_CLIENT_SECRET — app do Discord (mesmo do admin panel)
#   SSO_SECRET            — HMAC dos tokens SSO; compartilhado com os sites (org secret)
