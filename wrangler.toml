name = "auth"
main = "src/index.js"
compatibility_date = "2026-07-02"
compatibility_flags = ["nodejs_compat"]

# routes: auth.criativaria.com volta na Fase B do ADR-0003

[vars]
# Origem canônica usada para montar o redirect_uri OAuth (login E token-exchange
# DEVEM usar o mesmo valor — Discord rejeita se divergir). Evita a fragilidade de
# `url.origin` dinâmico (incidente 2026-07-05: origin drift derrubou o allowlist
# do Discord). Na Fase B (auth.criativaria.com ao vivo), registre AMBOS os
# redirect_uri no app do Discord antes de trocar este valor. Ver auth#3.
CANONICAL_ORIGIN = "https://auth.criativaria.com"
# Origens autorizadas a receber tokens SSO (proteção contra open redirect).
# Uma por site de staging, separadas por vírgula.
ALLOWED_ORIGINS = "https://criativaria-clt-pj.pages.dev,https://calculadora.criativaria.com,https://admin.criativaria.com,https://posicionamento.criativaria.com"
# Sufixos de projeto Cloudflare Pages: cobrem TODOS os subdomínios de preview
# (`<branch>.<host>`) sem precisar allowlistar cada branch. Use o HOST COMPLETO
# auto-suffixado do projeto (ex.: `criativaria-linkedin-34m.pages.dev`), NUNCA o
# `pages.dev` pelado (recusado em código). Ver ADR 0002.
ALLOWED_ORIGIN_SUFFIXES = "criativaria-linkedin-34m.pages.dev"
DISCORD_CLIENT_ID = "1517548885038338140"
DISCORD_GUILD_ID = "895505900016631839"

# KV namespaces (via `wrangler kv namespace create RATE_LIMIT`):
#   RATE_LIMIT — rate-limit counters per IP

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "3529abdcbb8e4d39bb6be5f50df8b4b2"
preview_id = "3529abdcbb8e4d39bb6be5f50df8b4b2"

# Secrets (via `wrangler secret put` ou CI):
#   DISCORD_CLIENT_SECRET — app do Discord (mesmo do admin panel)
#   SSO_SECRET            — HMAC dos tokens SSO; compartilhado com os sites (org secret)
