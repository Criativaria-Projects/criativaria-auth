name = "criativaria-auth"
main = "src/index.js"
compatibility_date = "2026-07-02"

routes = [
  { pattern = "auth.criativaria.com", custom_domain = true }
]

[vars]
# Origens autorizadas a receber tokens SSO (proteção contra open redirect).
# Uma por site de staging, separadas por vírgula.
ALLOWED_ORIGINS = "https://criativaria-clt-pj.pages.dev"
DISCORD_CLIENT_ID = "1517548885038338140"
DISCORD_GUILD_ID = "895505900016631839"

# Secrets (via `wrangler secret put` ou CI):
#   DISCORD_CLIENT_SECRET — app do Discord (mesmo do admin panel)
#   SSO_SECRET            — HMAC dos tokens SSO; compartilhado com os sites (org secret)
