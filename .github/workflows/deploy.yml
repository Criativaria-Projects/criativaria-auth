name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # registry-url + scope make setup-node write an auth-configured .npmrc at
      # runtime from NODE_AUTH_TOKEN — the repo's own .npmrc is gitignored (it
      # holds a real token locally), so CI must generate one this way.
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@criativaria-projects'

      # PACKAGES_READ_TOKEN: classic PAT with read:packages, needed for
      # @criativaria-projects/auth-crypto (private GitHub Packages registry).
      # Must run before the wrangler-action deploy step below — that action
      # only installs wrangler itself, not this repo's own dependencies.
      # See career-tools/docs/adr/0002-shared-auth-crypto-package-defer-jwt-migration.md
      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_READ_TOKEN }}

      - run: npm test

      - name: Deploy worker
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.84.1"
          command: deploy

      - name: Sync secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DISCORD_CLIENT_SECRET: ${{ secrets.DISCORD_CLIENT_SECRET }}
          SSO_SECRET: ${{ secrets.SSO_SECRET }}
        run: |
          for key in DISCORD_CLIENT_SECRET SSO_SECRET; do
            value="${!key}"
            if [ -n "$value" ]; then
              printf '%s' "$value" | npx --yes wrangler@4.84.1 secret put "$key"
              echo "synced $key"
            else
              echo "skipped $key (sem secret no GitHub)"
            fi
          done
