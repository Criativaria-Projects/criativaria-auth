name: CI

on:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Mesmo padrão do deploy.yml: setup-node gera o .npmrc autenticado em
      # runtime a partir de NODE_AUTH_TOKEN (o .npmrc do repo é gitignored).
      - uses: actions/setup-node@v7
        with:
          cache: npm
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@criativaria-projects'

      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_READ_TOKEN }}

      - run: npm test
